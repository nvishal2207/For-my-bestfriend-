<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For My Best Friend 💛</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
    body {
      font-family: 'Poppins', sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4, #a1c4fd);
      color: #333;
      padding: 40px 20px;
      min-height: 100vh;
      margin: 0;
    }
    h1 { 
      font-size: 3em; 
      color: #e91e63; 
      margin: 20px 0; 
    }
    .subtitle { 
      font-size: 1.6em; 
      margin-bottom: 20px; 
      color: #444;
    }
    .message { 
      font-size: 1.4em; 
      max-width: 600px; 
      margin: 30px auto; 
      background: rgba(255,255,255,0.8); 
      padding: 25px; 
      border-radius: 20px; 
      line-height: 1.6;
    }
    button {
      padding: 15px 35px;
      font-size: 1.4em;
      background: #ff4081;
      color: white;
      border: none;
      border-radius: 50px;
      margin: 10px;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(255,64,129,0.3);
    }
    button:hover { transform: scale(1.08); }
    .heart { 
      font-size: 5em; 
      animation: pulse 1.5s infinite; 
    }
    @keyframes pulse { 
      0%,100% {transform:scale(1);} 
      50% {transform:scale(1.3);} 
    }
  </style>
</head>
<body>
  <h1>Hey My Best Friend! 🫂</h1>
  <p class="subtitle">This is made specially for you 💕</p>
  
  <div class="heart">💖</div>
  
  <div class="message">
    You are my favorite person in this world.<br>
    Thank you for being such an amazing friend,<br>
    for all the laughter, support, and beautiful memories ❤️
  </div>

  <button onclick="surprise()">Click for a Sweet Surprise 🎉</button>

  <script>
    function surprise() {
      alert("I’m so grateful to have you as my best friend. You make life brighter every day! 🥹💛");
    }
  </script>
</body>

</html>
